# 1. The Deployment (Computes & Pods)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apnea-app-deployment
  labels:
    app: apnea-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apnea-app
  template:
    metadata:
      labels:
        app: apnea-app
    spec:
      initContainers:
      - name: fetch-ml-weights
        image: amazon/aws-cli:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            aws s3 cp s3://apnea-api-ml-weights-676206922033/penta_lstm_OSA_weights.pth /shared-weights/
            aws s3 cp s3://apnea-api-ml-weights-676206922033/penta_lstm_CA_weights.pth /shared-weights/
        volumeMounts:
        - name: model-weights-volume
          mountPath: /shared-weights

      containers:
      - name: apnea-main-container
        image: 676206922033.dkr.ecr.eu-central-1.amazonaws.com/apnea-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: api-port
        - containerPort: 8501
          name: ui-port
          
        # 👇 NEW: Injecting the Secret 👇
        env:
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: openai-secret
                key: OPENAI_API_KEY

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "3072Mi"
            cpu: "1000m"

        volumeMounts:
        - name: model-weights-volume
          mountPath: /app/penta_lstm_OSA_weights.pth
          subPath: penta_lstm_OSA_weights.pth
        - name: model-weights-volume
          mountPath: /app/penta_lstm_CA_weights.pth
          subPath: penta_lstm_CA_weights.pth
          
      volumes:
      - name: model-weights-volume
        emptyDir: {}

---
# 2. The Service (Networking & Load Balancing)
apiVersion: v1
kind: Service
metadata:
  name: apnea-app-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: apnea-app 
  ports:
    - name: http
      port: 80           
      targetPort: 8501   
      protocol: TCP